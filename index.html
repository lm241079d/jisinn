<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>歴史的震災アーカイブ - ポータル</title>
    <link rel="stylesheet" href="css/index.css">
</head>
<body>

    <header>
        <h1>日本の大地震アーカイブ</h1>
        <p>調べたい年を選択すると、当時の地震データマップへ移動します。</p>
    </header>

    <div class="grid-container">

        <a href="html/map1923.html" class="year-card active card-1923">
            <div>
                <p class="card-year color-1923">1923</p>
                <p class="card-title">関東大震災</p>
                <p class="card-desc">防災の日が制定されるきっかけとなった地震</p>
            </div>
            <span class="card-btn">マップを開く</span>
        </a>

     
        <a href="html/map1995.html" class="year-card active card-1995">
            <div>
                <p class="card-year color-1995">1995</p>
                <p class="card-title">阪神・淡路大震災</p>
                <p class="card-desc">NPO法制定に繋がった地震</p>
            </div>
            <span class="card-btn">マップを開く</span>
        </a>
        
 
        <a href="html/map2011.html" class="year-card active card-2011">
            <div>
                <p class="card-year color-2011">2011</p>
                <p class="card-title">東日本大震災</p>
                <p class="card-desc">日本観測史上最大の超巨大地震</p>
            </div>
            <span class="card-btn">マップを開く</span>  
        </a>

  
        <a href="html/map2024.html" class="year-card active card-2024">
            <div>
                <p class="card-year color-2024">2024</p>
                <p class="card-title">能登半島地震</p>
                <p class="card-desc">地震発生後の豪雨により二重の災害が発生した地震</p>
            </div>
            <span class="card-btn">マップを開く</span>    
        </a>
    </div>

</body>
</html>
